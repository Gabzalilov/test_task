name: booking-service

x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://booking_user:booking_password@db:5432/bookings}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
  BOOKING_FAILURE_RATE: ${BOOKING_FAILURE_RATE:-0.15}
  POST_BOOKINGS_RATE_LIMIT_PER_MINUTE: ${POST_BOOKINGS_RATE_LIMIT_PER_MINUTE:-60}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookings
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d bookings"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: booking-service-app
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment: *app-environment
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: booking-service-app
    build: .
    command: celery -A app.celery_app.celery_app worker --loglevel=INFO
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
